<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Monitoring MCCB & PDB</title>
  <link rel="icon" href="logo.png" type ="image/png"/>
  <style>
    /* --- STYLES (Basis index (1).html & coba2.html) --- */
    body { font-family: 'Segoe UI', sans-serif; background-color: #0d3b66; margin: 0; padding: 0; color: #000; }
    .container { background: #fff; border-radius: 20px; padding: 20px; max-width: 850px; margin: 40px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    h1 { text-align: center; color: #0d3b66; margin-bottom: 20px; }
    select, input, textarea, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
    textarea { resize: vertical; }
    button { background: #0d3b66; color: #fff; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; margin-top: 10px; }
    button:hover { background: #094a8a; }
    #toast { visibility: hidden; min-width: 250px; background-color: #0d3b66; color: #fff; text-align: center; border-radius: 8px; padding: 10px; position: fixed; z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; text-align: left; }
    th { background: #0d3b66; color: white; text-align: center; }
    .small { font-size: 12px; color: #444; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .arus-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .preview { margin-top: 20px; }
    
    /* Tombol Upload */
    .btn-foto { padding: 12px; border-radius: 8px; border: none; color: #fff; font-weight: bold; cursor: pointer; flex: 1; margin: 0; font-size: 14px; }
    .btn-kamera { background: #28a745; }
    .btn-kamera:hover { background: #218838; }
    .btn-galeri { background: #17a2b8; }
    .btn-galeri:hover { background: #138496; }
    
    #flowBtn { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e6e6e6 40%, #cfcfcf 100%); color: #0d3b66; border: 1px solid rgba(255,255,255,0.6); font-size: 22px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.6), inset 0 -3px 6px rgba(0,0,0,0.25); transition: all 0.3s ease; z-index: 9999; }
    #flowModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; }
    #flowModal.show { display:flex; }
    .flowContent { background: #fff; border-radius: 16px; padding: 20px; max-width: 90%; max-height: 85%; overflow-y: auto; position: relative; text-align: center; }
    .flowContent img { max-width: 100%; height: auto; border-radius: 8px; }
    #closeFlow { position: absolute; top: 8px; right: 16px; font-size: 28px; font-weight: bold; color: #444; cursor: pointer; }
    
    /* Custom Modal Timestamp Terpadu */
    #timestampModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .ts-content { background: #fff; padding: 20px; border-radius: 12px; max-width: 90%; text-align: center; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .ts-content h3 { color: #0d3b66; margin-top: 0; margin-bottom: 10px; }
    .btn-ts { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-ts-today { background: #0d3b66; color: #fff; }
    .btn-ts-shift { background: #28a745; color: #fff; }
    .shift-box { background: #f4f8fb; border: 1px solid #c2d1d9; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .manual-time-container { display: flex; gap: 8px; align-items: center; margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 10px; }

    /* Custom Modal Webcam Desktop */
    #webcamModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10005; }
    #videoStream { width: 100%; max-width: 600px; border-radius: 12px; background: #000; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .webcam-btn-container { display: flex; gap: 15px; }
    .btn-jepret { background: #28a745; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; }
    .btn-tutup-webcam { background: #dc3545; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="container" id="loginSection">
    <h1>Login Petugas</h1>
    <label for="loginNama">Nama Petugas:</label>
    <input type="text" id="loginNama" placeholder="Masukkan nama petugas" required />
    <label for="loginSatuan">Satuan Kerja:</label>
    <select id="loginSatuan" required>
      <option value="">-- Pilih Satuan Kerja --</option>
      <option>Stasiun Pucanggading</option>
      <option>Tx Baribis</option>
      <option>Tx Garung</option>
      <option>Tx Gantungan</option>
      <option>Tx Gn Depok</option>
      <option>Tx Gn Tugel</option>
      <option>Tx Gombel</option>
      <option>Tx Pager Gedog</option>
      <option>Tx Pucang Pendawa</option>
      <option>Tx Semanggi</option>
      <option>Tx Eromoko</option>
      <option>Tx Gn Priksa</option>
    </select>
    <button id="loginBtn">Masuk</button>
    <p id="loginStatus" style="text-align:center; color:#666; font-size:14px;">🔹 Masukkan identitas Anda untuk melanjutkan.</p>
  </div>

  <div class="container hidden" id="formSection">
    <h1>📋 Form Metering</h1>
    
    <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 15px; background: #eef2f5; padding: 10px; border-radius: 8px; border: 1px solid #c2d1d9;">
      <div style="flex: 1;">
        <p id="lokasiStatus2" class="small" style="margin: 0; font-weight: bold; line-height: 1.4;">📍 Sedang mencari lokasi satelit...</p>
        
        <div id="cacheFallback" style="display: none; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ccc;">
          <p id="cacheText" style="margin: 0; font-size: 11px; color: #555; margin-bottom: 6px;">Lokasi tersimpan: -</p>
          <button type="button" id="btnPakaiCache" style="padding: 6px 10px; font-size: 11px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">✅ Pakai lokasi ini</button>
        </div>
      </div>
      <button type="button" id="btnRetryLokasi" style="width: auto; margin: 0 0 0 10px; padding: 8px 12px; font-size: 12px; background: #ffc107; color: #000; display: none; border-radius: 6px; border:none; font-weight:bold; cursor:pointer;">🔄 Coba Lagi</button>
    </div>

    <form id="formPage">
      <label>Nama Petugas:</label>
      <input type="text" id="petugas" readonly />

      <label>Satuan Kerja:</label>
      <input type="text" id="satuan_kerja" readonly />

      <div class="form-row">
        <div>
          <label>Tanggal:</label>
          <input type="date" id="tanggal" required style="margin-bottom:0;" />
        </div>
        <div>
          <label>Shift:</label>
          <select id="shift" style="margin-bottom:0;">
            <option value="">-- Pilih Shift --</option>
            <option>Shift 1</option>
            <option>Shift 2</option>
            <option>Shift 3</option>
          </select>
        </div>
      </div>

      <label>Upload Foto : </label>
      <div style="display: flex; gap: 10px; margin-bottom: 0;">
        <button type="button" id="btnKamera" class="btn-foto btn-kamera">📸 Kamera Langsung</button>
        <button type="button" id="btnGaleri" class="btn-foto btn-galeri">🖼️ Buka Galeri</button>
      </div>
      
      <input type="file" id="foto" accept="image/*" style="display: none;" />
      
      <div id="fotoStatus" class="small" style="margin-top:6px; margin-bottom:15px; color:#444;">— belum ada foto</div>

      <label>Jenis MCCB / PDB:</label>
      <select id="mccb">
        <option value="">-- Pilih MCCB/PDB --</option>
      </select>

      <div id="blok_tegangan" style="display: none;">
        <label style="font-weight: bold; color: #0d3b66;">Tegangan (Volt):</label>
        <div class="arus-row">
          <div>
            <label for="tegangan_r">Tegangan R (V):</label>
            <input type="number" id="tegangan_r" step="0.01" style="margin-bottom:0;" />
          </div>
          <div>
            <label for="tegangan_s">Tegangan S (V):</label>
            <input type="number" id="tegangan_s" step="0.01" style="margin-bottom:0;" />
          </div>
          <div>
            <label for="tegangan_t">Tegangan T (V):</label>
            <input type="number" id="tegangan_t" step="0.01" style="margin-bottom:0;" />
          </div>
        </div>
      </div>

      <div id="blok_arus" style="display: none;">
        <label style="font-weight: bold; color: #0d3b66;">Arus (Ampere):</label>
        <div class="arus-row">
          <div>
            <label interpreters for="arus_r">Arus R (A):</label>
            <input type="number" id="arus_r" step="0.01" style="margin-bottom:0;" />
          </div>
          <div>
            <label for="arus_s">Arus S (A):</label>
            <input type="number" id="arus_s" step="0.01" style="margin-bottom:0;" />
          </div>
          <div>
            <label for="arus_t">Arus T (A):</label>
            <input type="number" id="arus_t" step="0.01" style="margin-bottom:0;" />
          </div>
        </div>
      </div>

      <label>Catatan:</label>
      <textarea id="catatan" placeholder="Tambahkan catatan..."></textarea>

      <button type="button" id="saveBtn" style="background: #28a745;">💾 Simpan Data ke Tabel</button>
      <button type="button" id="submitBtn" style="background:#0056b3;">📤 Kirim ke Spreadsheet Data Metering</button>
    </form>

    <div id="status"></div>

    <div class="preview">
      <h3 id="previewTitle">📋 Data Tersimpan (Belum Dikirim)</h3>
      <img id="fotoPreview" class="hidden" alt="Preview foto" style="max-width:100%; margin-bottom:8px; border-radius:8px;">
      
      <button type="button" id="downloadBtn" class="hidden" style="background:#ffc107; color:#000; margin-bottom:15px;">⬇️ Unduh Gambar Ber-Watermark</button>
      
      <div id="output"></div>
    </div>
  </div>

  <div id="toast"></div>
  <button id="flowBtn" title="Lihat Panduan">❓</button>

  <div id="flowModal" class="hidden">
    <div class="flowContent">
      <span id="closeFlow">&times;</span>
      <h2>🧭 Panduan Pengisian</h2>
      <img id="flowImg" src="" alt="Flowchart Panduan" />
    </div>
  </div>

  <div id="timestampModal">
    <div class="ts-content">
      <h3>Opsi Watermark Foto</h3>
      <p id="modalDesc" style="font-size: 13px; color: #444; margin-bottom: 15px;"></p>
      
      <button id="btnSkipWm" class="btn-ts" style="background: #6c757d; color: #fff; margin-bottom: 15px; display: none;">📁 Foto Saya Sudah Bergeotag<br><small style="font-weight:normal;">(Upload Tanpa Watermark Tambahan)</small></button>

      <div id="matchOptions" style="display: none;">
        <button id="btnTambahkanWm" class="btn-ts btn-ts-today" style="margin-bottom: 0;">📍 Tambahkan Watermark Geotag<br><small id="lblTambahkanWm" style="font-weight:normal;"></small></button>
      </div>

      <div id="mismatchOptions" style="display: none;">
        <button id="btnTsToday" class="btn-ts btn-ts-today">📍 Gunakan Waktu Saat Ini<br><small id="lblTsToday" style="font-weight:normal;"></small></button>
        
        <div class="shift-box">
          <button id="btnTsShift" class="btn-ts btn-ts-shift" style="margin-bottom: 0;">📍 Sesuai Input Shift<br><small id="lblTsShift" style="font-weight:normal;"></small></button>
          
          <div class="manual-time-container">
            <span style="font-size: 11px; color: #666; font-weight: bold;">Atau Atur Manual:</span>
            <input type="time" id="manualTime" style="margin: 0; flex: 1; font-size: 12px; padding: 6px;" />
            <button id="btnTsManual" style="margin: 0; padding: 6px 10px; font-size: 11px; background: #e0e0e0; color: #333; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; cursor: pointer;">Pilih Jam</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="webcamModal">
    <h3 style="color:white; margin-bottom:15px;">Ambil Foto (Webcam)</h3>
    <video id="videoStream" autoplay playsinline></video>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
    <div class="webcam-btn-container">
      <button id="btnSnap" class="btn-jepret">📸 Jepret Foto</button>
      <button id="btnCloseCamera" class="btn-tutup-webcam">Batal</button>
    </div>
  </div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyJzVBQMNY6m_sOsOxBdMYXjS9S0BwSeYxoALxTqk2ps9BNNBONBldijajMN-q-dE7Krw/exec"; 
const fotoUploadURL = "https://script.google.com/macros/s/AKfycbxOsZ8NO-TSe9QI3xBnt81hOuv7r3H1VKs8QYvr9UsUOoM6NmTEFGY2VI5Zesj_kZSvZQ/exec"; 

/* DOM refs */
const lokasiEl = document.getElementById('lokasiStatus2');
const btnRetryLokasi = document.getElementById('btnRetryLokasi');
const cacheFallback = document.getElementById('cacheFallback');
const cacheText = document.getElementById('cacheText');
const btnPakaiCache = document.getElementById('btnPakaiCache');
const output = document.getElementById('output');
const status = document.getElementById('status');
const loginBtn = document.getElementById('loginBtn');
const loginNama = document.getElementById('loginNama');
const loginSatuan = document.getElementById('loginSatuan');
const loginSection = document.getElementById('loginSection');
const formSection = document.getElementById('formSection');

const btnKamera = document.getElementById('btnKamera');
const btnGaleri = document.getElementById('btnGaleri');
const foto = document.getElementById('foto');
const webcamModal = document.getElementById('webcamModal');
const videoStream = document.getElementById('videoStream');
const cameraCanvas = document.getElementById('cameraCanvas');
const btnSnap = document.getElementById('btnSnap');
const btnCloseCamera = document.getElementById('btnCloseCamera');

let desktopStream = null;
let isFromGallery = false; 

const fotoStatus = document.getElementById('fotoStatus');
const fotoPreview = document.getElementById('fotoPreview');
const downloadBtn = document.getElementById('downloadBtn');
const el = { mccb: document.getElementById('mccb') };

const ORDER_PDB = ["MDB Utama/PLN", "PDB Pemancar", "PDB Sarpras"];
const ORDER_MCCB = [
  "MCCB GPO/Administrasi","MCCB Peralatan G. Ops.","MCCB Pen. Lantai 2 G. Ops.",
  "MCCB AC Lantai 2 G. Ops.","MCCB AC Studio Utama","MCCB AC R. Berita / Siaran Lantai 2, G.Ops.",
  "MCCB Studio 2 dan AC Teknik","MCCB Lap. Tenis/AC R. Redaksi G. Ops.",
  "MCCB AC Lantai 1 G. Ops.","MCCB Dimer/Lighting Sto. 1","MCCB Outdoor/L. Taman"
];

const blokTegangan = document.getElementById('blok_tegangan');
const blokArus = document.getElementById('blok_arus');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

let lokasiTeks = {};
let tempInputs = {};
let fotoDriveURL = ""; 
let loginTimestamp ="";
let currentCompressedDataURL = "";
let savedReports = {};

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

/* ---------- geolocation + reverse + cache ---------- */
function cekCacheLokasi() {
  const latCache = localStorage.getItem('cachedLat');
  const lngCache = localStorage.getItem('cachedLng');
  const alamatCache = localStorage.getItem('cachedAlamat');
  if (latCache && lngCache) {
    cacheFallback.style.display = 'block';
    cacheText.innerHTML = `<strong>Lokasi tersimpan sebelumnya:</strong><br>${alamatCache || latCache + ', ' + lngCache}`;
  } else {
    cacheFallback.style.display = 'none';
  }
}

function getLocation() {
  lokasiEl.textContent = "📍 Sedang mencari lokasi satelit... Tunggu ya.";
  btnRetryLokasi.style.display = 'none';
  cacheFallback.style.display = 'none';

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      lokasiTeks = { lat, lng };
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const data = await res.json();
        lokasiTeks.alamat = data.display_name;
        lokasiEl.textContent = `📍 ${data.display_name} (${lat}, ${lng})`;
        localStorage.setItem('cachedLat', lat);
        localStorage.setItem('cachedLng', lng);
        localStorage.setItem('cachedAlamat', data.display_name || "");
      } catch {
        lokasiEl.textContent = `📍 (${lat}, ${lng})`;
      }
    }, err => {
      btnRetryLokasi.style.display = 'inline-block';
      cekCacheLokasi(); 
    }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
  }
}
getLocation();

btnRetryLokasi.addEventListener('click', () => { lokasiTeks = {}; getLocation(); });
btnPakaiCache.addEventListener('click', () => {
  lokasiTeks = {
    lat: localStorage.getItem('cachedLat'),
    lng: localStorage.getItem('cachedLng'),
    alamat: localStorage.getItem('cachedAlamat')
  };
  lokasiEl.textContent = `📍 ${lokasiTeks.alamat || ''} (${lokasiTeks.lat}, ${lokasiTeks.lng}) [Lokasi Tersimpan]`;
  cacheFallback.style.display = 'none';
  showToast("✅ Menggunakan lokasi cadangan.");
});

/* ---------- populate MCCB / PDB Options ---------- */
function isiDropdownMccbDinamis(unit) {
  el.mccb.innerHTML = '<option value="">-- Pilih MCCB/PDB --</option>';
  
  if (unit === "Stasiun Pucanggading") {
    const g1 = document.createElement('optgroup');
    g1.label = "— Kategori PDB —";
    ORDER_PDB.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p; g1.appendChild(o);
    });
    el.mccb.appendChild(g1);

    const g2 = document.createElement('optgroup');
    g2.label = "— Kategori MCCB —";
    ORDER_MCCB.forEach(m => {
      const o = document.createElement('option');
      o.value = m; o.textContent = m; g2.appendChild(o);
    });
    el.mccb.appendChild(g2);
  } else {
    ORDER_PDB.forEach(p => {
      const o = document.createElement('option');
      o.value = p; o.textContent = p; el.mccb.appendChild(o);
    });
  }
}

el.mccb.addEventListener("change", () => {
  const prev = el.mccb.dataset.prev;
  if (prev) {
    tempInputs[prev] = {
      disabled_v_r: document.getElementById('tegangan_r').value,
      disabled_v_s: document.getElementById('tegangan_s').value,
      disabled_v_t: document.getElementById('tegangan_t').value,
      r: document.getElementById('arus_r').value,
      s: document.getElementById('arus_s').value,
      t: document.getElementById('arus_t').value,
      catatan: document.getElementById('catatan').value
    };
  }

  const jenisBaru = el.mccb.value;
  document.getElementById('tegangan_r').value = "";
  document.getElementById('tegangan_s').value = "";
  document.getElementById('tegangan_t').value = "";
  document.getElementById('arus_r').value = "";
  document.getElementById('arus_s').value = "";
  document.getElementById('arus_t').value = "";
  document.getElementById('catatan').value = "";

  if (jenisBaru !== "") {
    blokArus.style.display = "block";
    if (ORDER_PDB.includes(jenisBaru)) {
      blokTegangan.style.display = "block";
    } else {
      blokTegangan.style.display = "none";
    }
  } else {
    blokTegangan.style.display = "none";
    blokArus.style.display = "none";
  }

  if (tempInputs[jenisBaru]) {
    const d = tempInputs[jenisBaru];
    document.getElementById('tegangan_r').value = d.disabled_v_r || "";
    document.getElementById('tegangan_s').value = d.disabled_v_s || "";
    document.getElementById('tegangan_t').value = d.disabled_v_t || "";
    document.getElementById('arus_r').value = d.r || "";
    document.getElementById('arus_s').value = d.s || "";
    document.getElementById('arus_t').value = d.t || "";
    document.getElementById('catatan').value = d.catatan || "";
  }
  el.mccb.dataset.prev = jenisBaru;
});

/* ---------- AUTO UPDATE TANGGAL & SHIFT DI TABEL ---------- */
document.getElementById('shift').addEventListener('change', (e) => {
  Object.keys(savedReports).forEach(k => savedReports[k].shift = e.target.value);
  saveToLocalStorage();
  if (Object.keys(savedReports).length > 0) renderOutput(); 
});
document.getElementById('tanggal').addEventListener('change', (e) => {
  Object.keys(savedReports).forEach(k => savedReports[k].tanggal = e.target.value);
  saveToLocalStorage();
  if (Object.keys(savedReports).length > 0) renderOutput(); 
});

/* ---------- login flow ---------- */
loginBtn.addEventListener('click', () => {
  const nama = loginNama.value.trim();
  const satuan = loginSatuan.value;
  if (!nama || !satuan) { alert("Mohon isi Nama Petugas dan pilih Satuan Kerja terlebih dahulu."); return; }
  loginTimestamp = new Date().toISOString();
  localStorage.setItem('lastNamaPetugas', nama);
  localStorage.setItem('lastSatuanKerja', satuan);
  document.getElementById('petugas').value = nama;
  document.getElementById('satuan_kerja').value = satuan;
  loginSection.classList.add('hidden');
  formSection.classList.remove('hidden');
  isiDropdownMccbDinamis(satuan);
  loadFromLocalStorage(); 
});

window.addEventListener('load', () => {
  const lastNama = localStorage.getItem('lastNamaPetugas');
  const lastSatuan = localStorage.getItem('lastSatuanKerja');
  if (lastNama) {
    loginNama.value = lastNama;
    if (lastSatuan) loginSatuan.value = lastSatuan;
    document.getElementById('loginStatus').innerHTML = `🔹 Terakhir login sebagai <strong>${lastNama}</strong> (${lastSatuan}).`;
  }

/* ---------- LOCAL STORAGE DATA RETENTION ---------- */
function saveToLocalStorage() {
  const dataBackup = {
    savedReports: savedReports,
    tempInputs: tempInputs,
    fotoDriveURL: fotoDriveURL,
    currentCompressedDataURL: currentCompressedDataURL
  };
  localStorage.setItem('metering_local_backup', JSON.stringify(dataBackup));
}

function loadFromLocalStorage() {
  const cacheStr = localStorage.getItem('metering_local_backup');
  if (!cacheStr) return;
  try {
    const backup = JSON.parse(cacheStr);
    savedReports = backup.savedReports || {};
    tempInputs = backup.tempInputs || {};
    fotoDriveURL = backup.fotoDriveURL || "";
    
    if (backup.currentCompressedDataURL) {
      currentCompressedDataURL = backup.currentCompressedDataURL;
      fotoPreview.src = backup.currentCompressedDataURL;
      fotoPreview.classList.remove("hidden");
      downloadBtn.classList.remove("hidden");
      fotoStatus.textContent = "Base64 Pulih";
    }
    renderOutput();
  } catch(e) { console.error("Gagal sinkronisasi data local storage", e); }
}

/* ---------- FORMAT FOTO & WATERMARKING GEOTAG ---------- */
function formatTimeCustom(dateObj) {
  const dd = String(dateObj.getDate()).padStart(2, '0');
  const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
  const yyyy = dateObj.getFullYear();
  const hh = String(dateObj.getHours()).padStart(2, '0');
  const min = String(dateObj.getMinutes()).padStart(2, '0');
  const ss = String(dateObj.getSeconds()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;
}

function formatDateFromInput(tglStr, timeStr) {
  if(!tglStr) return timeStr;
  const [y, m, d] = tglStr.split('-');
  return `${d}/${m}/${y} ${timeStr}`;
}

function getCurrentShift(now) {
  const h = now.getHours();
  if (h >= 7 && h < 15) return "Shift 1"; 
  if (h >= 15 && h < 23) return "Shift 2"; 
  return "Shift 3"; 
}

function askWatermarkOptions(isMismatch, tglInput, shift, fromGallery) {
  return new Promise(resolve => {
    const modal = document.getElementById('timestampModal');
    const desc = document.getElementById('modalDesc');
    const matchOpts = document.getElementById('matchOptions');
    const mismatchOpts = document.getElementById('mismatchOptions');
    
    const now = new Date();
    const todayStrFull = formatTimeCustom(now);
    
    let shiftTime = "08:00:00"; 
    if(shift === "Shift 2") shiftTime = "16:00:00";
    if(shift === "Shift 3") shiftTime = "23:59:00";
    const shiftStrFull = formatDateFromInput(tglInput, shiftTime);

    const offset = now.getTimezoneOffset();
    const localNow = new Date(now.getTime() - (offset * 60 * 1000));
    const localTodayStr = localNow.toISOString().split('T')[0];

    const realMismatch = (tglInput !== localTodayStr || shift !== getCurrentShift(now));

    if (!fromGallery && !realMismatch) {
      resolve({ skip: false, timestamp: todayStrFull });
      return;
    }

    document.getElementById('btnSkipWm').style.display = fromGallery ? 'block' : 'none';

    if (realMismatch) {
      desc.textContent = "Tanggal atau Shift tidak sesuai dengan jadwal saat ini. Pilih opsi watermark:";
      matchOpts.style.display = 'none';
      mismatchOpts.style.display = 'block';
      document.getElementById('lblTsToday').textContent = todayStrFull;
      document.getElementById('lblTsShift').textContent = shiftStrFull;
    } else {
      desc.textContent = "Pilih apakah foto ini perlu ditambahkan watermark Geotag:";
      matchOpts.style.display = 'block';
      mismatchOpts.style.display = 'none';
      document.getElementById('lblTambahkanWm').textContent = todayStrFull;
    }

    modal.style.display = 'flex';

    document.getElementById('btnSkipWm').onclick = () => { modal.style.display = 'none'; resolve({ skip: true, timestamp: "" }); };
    document.getElementById('btnTambahkanWm').onclick = () => { modal.style.display = 'none'; resolve({ skip: false, timestamp: todayStrFull }); };
    document.getElementById('btnTsToday').onclick = () => { modal.style.display = 'none'; resolve({ skip: false, timestamp: todayStrFull }); };
    document.getElementById('btnTsShift').onclick = () => { modal.style.display = 'none'; resolve({ skip: false, timestamp: shiftStrFull }); };
    document.getElementById('btnTsManual').onclick = () => {
      let manualVal = document.getElementById('manualTime').value;
      if(!manualVal) { alert("Atur jam terlebih dahulu!"); return; }
      modal.style.display = 'none';
      if(manualVal.split(':').length === 2) manualVal += ":00";
      resolve({ skip: false, timestamp: formatDateFromInput(tglInput, manualVal) });
    };
  });
}

function compressAndWatermark(dataURL, customTimestamp, skipWatermark) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1200;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxW) { const ratio = maxW / w; w = maxW; h = Math.round(h * ratio); }
      canvas.width = w; canvas.height = h;
      ctx.clearRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);

      if (skipWatermark) { res(canvas.toDataURL('image/jpeg', 0.75)); return; }

      const titleSize = Math.max(18, Math.floor(h/35)); 
      const textSize = Math.max(14, Math.floor(h/45));  
      const padding = 20; const margin = 20;  
      const cardWidth = w - (margin * 2);
      
      const iconSize = textSize * 1.5;
      const iconMarginRight = 10;
      const detailAvailableWidth = cardWidth - (padding * 2) - iconSize - iconMarginRight;

      const petugas = document.getElementById('petugas').value || '';
      const satuan = document.getElementById('satuan_kerja').value || '';
      
      ctx.font = `${textSize}px Arial, sans-serif`;
      let addressLines = lokasiTeks.alamat ? wrapTextToArray(ctx, lokasiTeks.alamat, detailAvailableWidth) : ["Mencari jalan lokasi satelit..."];
      let coordText = lokasiTeks.lat ? `Lat ${lokasiTeks.lat}° Long ${lokasiTeks.lng}°` : "Lokasi tidak tersedia";
      
      const titleLineHeight = titleSize * 1.4;
      const textLineHeight = textSize * 1.4;
      const totalTextLines = addressLines.length + 2; 
      
      const cardHeight = padding + titleLineHeight + 12 + (totalTextLines * textLineHeight) + padding;
      const cardY = h - cardHeight - margin;

      const pinImg = new Image();
      pinImg.onload = () => {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        drawRoundRect(ctx, margin, cardY, cardWidth, cardHeight, 15); 
        
        ctx.textBaseline = 'top'; ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${titleSize}px Arial, sans-serif`;
        ctx.fillText(`${petugas} — ${satuan}`, margin + padding, cardY + padding);
        
        let currentY = cardY + padding + titleLineHeight + 12; 
        const iconY = currentY - ((iconSize - textSize) / 2);
        ctx.drawImage(pinImg, margin + padding, iconY, iconSize, iconSize);
        
        ctx.font = `${textSize}px Arial, sans-serif`;
        const startTextX = margin + padding + iconSize + iconMarginRight;
        
        addressLines.forEach(ln => { 
          ctx.fillText(ln, startTextX, currentY); 
          currentY += textLineHeight; 
        });
        ctx.fillText(coordText, startTextX, currentY); 
        currentY += textLineHeight;
        ctx.fillText(`${customTimestamp} GMT +07:00`, startTextX, currentY);
        
        res(canvas.toDataURL('image/jpeg',0.75));
      };
      pinImg.src = "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff5252'%3E%3Cpath d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/%3E%3C/svg%3E";
    };
    img.src = dataURL;
  });
}

function wrapTextToArray(ctx, text, maxWidth) {
  if(!text) return []; const words = text.split(' '), lines = []; let cur = "";
  for(const w of words){
    const test = cur ? cur + " " + w : w;
    if(ctx.measureText(test).width > maxWidth && cur){ lines.push(cur); cur = w; } else { cur = test; }
  }
  if(cur) lines.push(cur); return lines; 
}
function drawRoundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath(); ctx.fill();
}

btnGaleri.addEventListener('click', () => { isFromGallery = true; foto.removeAttribute('capture'); foto.click(); });
btnKamera.addEventListener('click', async () => {
  isFromGallery = false;
  if (/Android|iPhone|iPad/i.test(navigator.userAgent)) { foto.setAttribute('capture', 'environment'); foto.click(); } 
  else {
    try { desktopStream = await navigator.mediaDevices.getUserMedia({ video: true }); videoStream.srcObject = desktopStream; webcamModal.style.display = 'flex'; } 
    catch { foto.removeAttribute('capture'); foto.click(); }
  }
});
btnCloseCamera.addEventListener('click', () => { webcamModal.style.display = 'none'; if(desktopStream) desktopStream.getTracks().forEach(t=>t.stop()); });
btnSnap.addEventListener('click', () => {
  cameraCanvas.width = videoStream.videoWidth; cameraCanvas.height = videoStream.videoHeight;
  cameraCanvas.getContext('2d').drawImage(videoStream, 0, 0);
  webcamModal.style.display = 'none'; if(desktopStream) desktopStream.getTracks().forEach(t=>t.stop());
  jalankanProsesFoto(cameraCanvas.toDataURL('image/jpeg')); 
});
foto.addEventListener("change", (ev) => {
  if(ev.target.files?.[0]) {
    const r = new FileReader(); r.onload = () => jalankanProsesFoto(r.result); r.readAsDataURL(ev.target.files[0]);
  }
});

async function jalankanProsesFoto(dataUrl) {
  const tgl = document.getElementById("tanggal").value;
  const shf = document.getElementById("shift").value;
  if (!shf || !tgl) { alert("Pilih tanggal & Shift dahulu sebelum memproses foto."); return; }
  try {
    const now = new Date();
    const isMismatch = (tgl !== now.toISOString().split('T')[0] || shf !== getCurrentShift(now));
    let choice = await askWatermarkOptions(isMismatch, tgl, shf, isFromGallery);
    
    currentCompressedDataURL = await compressAndWatermark(dataUrl, choice.timestamp, choice.skip);
    fotoPreview.src = currentCompressedDataURL;
    fotoPreview.classList.remove("hidden"); downloadBtn.classList.remove("hidden");
    fotoStatus.textContent = "⏳ Mengunggah foto ke Drive...";
    
    const body = new URLSearchParams();
    body.append("filedata", currentCompressedDataURL.split(",")[1]);
    body.append("mimetype", "image/jpeg");
    body.append("petugas", document.getElementById("petugas").value);
    body.append("satuan_kerja", document.getElementById("satuan_kerja").value);

    const res = await fetch(fotoUploadURL, { method: "POST", body: body });
    const result = await res.json();
    if (result.status === "ok" && result.url) {
      fotoDriveURL = result.url;
      fotoStatus.textContent = "✅ Foto tersimpan di Drive.";
      showToast("📸 Unggah foto sukses.");
      saveToLocalStorage();
      renderOutput();
    }
  } catch {
    fotoStatus.textContent = "❌ Upload gagal.";
  }
}

downloadBtn.addEventListener('click', () => {
  const a = document.createElement('a'); a.href = currentCompressedDataURL;
  a.download = `Geotag_${document.getElementById('mccb').value || 'Panel'}_${Date.now()}.jpg`; a.click();
});

/* ---------- PERSISTENCE LOKAL & SIMPAN KE TABEL PREVIEW ---------- */
document.getElementById('saveBtn').addEventListener('click', () => {
  const satuan = document.getElementById('satuan_kerja').value;
  const petugas = document.getElementById('petugas').value;
  const tanggal = document.getElementById('tanggal').value;
  const shift = document.getElementById('shift').value;
  const jenis = document.getElementById('mccb').value;
  
  const teg_r = document.getElementById('tegangan_r').value;
  const teg_s = document.getElementById('tegangan_s').value;
  const teg_t = document.getElementById('tegangan_t').value;
  const r = document.getElementById('arus_r').value;
  const s = document.getElementById('arus_s').value;
  const t = document.getElementById('arus_t').value;
  const catatan = document.getElementById('catatan').value;

  if (!tanggal || !shift || !jenis) { alert("Lengkapi pilihan Tanggal, Shift, dan Komponen Panel!"); return; }

  savedReports[jenis] = {
    tanggal, shift, jenis,
    tegangan_r: teg_r || "-", tegangan_s: teg_s || "-", tegangan_t: teg_t || "-",
    arus_r: r || "-", arus_s: s || "-", arus_t: t || "-", catatan: catatan || "-"
  };

  saveToLocalStorage(); 
  renderOutput();
  showToast("💾 Baris data berhasil ditambahkan ke tabel preview!");
});

/* ---------- RENDER OUTPUT TABEL DENGAN MERGE HEADER RST & CATATAN ---------- */
function renderOutput() {
  if (Object.keys(savedReports).length === 0) {
    output.innerHTML = "<em>Belum ada data tersimpan.</em>";
    return;
  }
  const satuan = document.getElementById('satuan_kerja').value;
  const petugas = document.getElementById('petugas').value;
  const urutan = satuan === "Stasiun Pucanggading" ? ORDER_MCCB : ORDER_PDB;
  const sorted = Object.values(savedReports).sort((a,b) => urutan.indexOf(a.jenis) - urutan.indexOf(b.jenis));

  let html = `<div style="margin-bottom: 15px; font-size: 14px; color: #000;">
      <table style="width: 100%; border: none; margin: 0; background: transparent;">
        <tr style="border: none;">
          <td style="border: none; padding: 4px 0; width: 140px; font-weight: normal;">Nama Petugas</td>
          <td style="border: none; padding: 4px 0;">: ${petugas}</td>
        </tr>
        <tr style="border: none;">
          <td style="border: none; padding: 4px 0; font-weight: normal;">Satuan Transmisi</td>
          <td style="border: none; padding: 4px 0;">: ${satuan}</td>
        </tr>
      </table>
    </div>`;

  html += `<div style='overflow-x: auto;'>
    <table>
      <tr>
        <th rowspan="2">Tanggal</th>
        <th rowspan="2">Shift</th>
        <th rowspan="2">Jenis</th>
        <th colspan="3">Tegangan (Volt)</th>
        <th colspan="3">Arus (Ampere)</th>
        <th rowspan="2">Catatan</th>
        <th rowspan="2">Foto</th>
      </tr>
      <tr>
        <th>R</th><th>S</th><th>T</th>
        <th>R</th><th>S</th><th>T</th>
      </tr>`;

  sorted.forEach((r, index) => {
    html += `<tr>
      <td>${r.tanggal}</td>
      <td>${r.shift}</td>
      <td style="font-weight:bold; color:#0d3b66;">${r.jenis}</td>
      <td style="text-align:center;">${r.tegangan_r}</td>
      <td style="text-align:center;">${r.tegangan_s}</td>
      <td style="text-align:center;">${r.tegangan_t}</td>
      <td style="text-align:center;">${r.arus_r}</td>
      <td style="text-align:center;">${r.arus_s}</td>
      <td style="text-align:center;">${r.arus_t}</td>
      <td>${r.catatan}</td>`;
    
    if (index === 0) {
      const fotoCell = fotoDriveURL ? `<a href="${fotoDriveURL}" target="_blank" style="color: #0056b3; font-weight: bold; text-decoration: none;">lihat</a>` : "—";
      html += `<td rowspan="${sorted.length}" style="text-align: center; vertical-align: middle;">${fotoCell}</td>`;
    }
    html += `</tr>`;
  });

  html += "</table></div>";
  output.innerHTML = html;
}

/* ---------- SUBMIT ALL DATA TO APPS SCRIPT DENGAN JSON HORIZONTAL ---------- */  
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (Object.keys(savedReports).length === 0) { alert("Tabel kosong! Simpan minimal satu panel via tombol Hijau."); return; }

  const btnKirim = document.getElementById('submitBtn');
  btnKirim.disabled = true; btnKirim.style.background = "#6c757d"; btnKirim.textContent = "⏳ Sedang memproses... JANGAN DITUTUP";
  status.textContent = "⏳ Mengirim data ke server...";

  const flatData = {
    tanggal: document.getElementById('tanggal').value,
    shift: document.getElementById('shift').value,
    petugas: document.getElementById('petugas').value,
    satuan_kerja: document.getElementById('satuan_kerja').value,
    link_foto: fotoDriveURL || "", 
    catatan: "",
    mdb_v_r: "", mdb_v_s: "", mdb_v_t: "", mdb_r: "", mdb_s: "", mdb_t: "",
    pem_v_r: "", pem_v_s: "", pem_v_t: "", pem_r: "", pem_s: "", pem_t: "",
    sar_v_r: "", sar_v_s: "", sar_v_t: "", sar_r: "", sar_s: "", sar_t: ""
  };

  let listCatatan = [];

  Object.values(savedReports).forEach(row => {
    const namaPanel = row.jenis.toLowerCase();
    const v_r = row.tegangan_r || ""; const v_s = row.tegangan_s || ""; const v_t = row.tegangan_t || "";
    const i_r = row.arus_r || ""; const i_s = row.arus_s || ""; const i_t = row.arus_t || "";

    if (namaPanel.includes("mdb") || namaPanel.includes("pln")) {
      if(v_r!=="-") flatData.mdb_v_r=v_r; if(v_s!=="-") flatData.mdb_v_s=v_s; if(v_t!=="-") flatData.mdb_v_t=v_t;
      if(i_r!=="-") flatData.mdb_r=i_r; if(i_s!=="-") flatData.mdb_s=i_s; if(i_t!=="-") flatData.mdb_t=i_t;
    } else if (namaPanel.includes("pemancar")) {
      if(v_r!=="-") flatData.pem_v_r=v_r; if(v_s!=="-") flatData.pem_v_s=v_s; if(v_t!=="-") flatData.pem_v_t=v_t;
      if(i_r!=="-") flatData.pem_r=i_r; if(i_s!=="-") flatData.pem_s=i_s; if(i_t!=="-") flatData.pem_t=i_t;
    } else if (namaPanel.includes("sarpras")) {
      if(v_r!=="-") flatData.sar_v_r=v_r; if(v_s!=="-") flatData.sar_v_s=v_s; if(v_t!=="-") flatData.sar_v_t=v_t;
      if(i_r!=="-") flatData.sar_r=i_r; if(i_s!=="-") flatData.sar_s=i_s; if(i_t!=="-") flatData.sar_t=i_t;
    }
    if (row.catatan && row.catatan !== "-") listCatatan.push(`${row.jenis}: ${row.catatan}`);
  });
  flatData.catatan = listCatatan.join(" | ");

  try {
    await fetch(scriptURL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
      body: JSON.stringify(flatData) 
    });
    status.textContent = "✅ Data berhasil masuk ke Spreadsheet!";
    showToast("✅ Berhasil Kirim Data Metering V2!");
    
    localStorage.removeItem('metering_local_backup');
    savedReports = {}; tempInputs = {};
    document.getElementById('previewTitle').textContent = "✅ Data Berhasil Terkirim";
    fotoPreview.classList.add("hidden"); downloadBtn.classList.add("hidden");
    fotoStatus.textContent = "— belum ada foto"; fotoDriveURL = "";
    renderOutput(); 
  } catch {
    status.textContent = "❌ Gagal kirim. Periksa koneksi internet.";
  } finally {
    btnKirim.disabled = false; btnKirim.style.background = "#0056b3"; btnKirim.textContent = "📤 Kirim ke Spreadsheet Data Metering";
  }
});
